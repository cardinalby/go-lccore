name: test

on:
  push:
    branches:
      - "**"
  workflow_dispatch:
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
      - run: go mod download
      - run: go test -race ./...